manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: splitkb
      url-base: https://github.com/splitkb
    - name: cirque-input-module
      url-base: https://github.com/petejohanson
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    - name: zmk-driver-charge-led
      remote: splitkb
      revision: main
    - name: zmk-driver-vik-sleep
      remote: splitkb
      revision: main
    - name: cirque-input-module
      remote: cirque-input-module
      revision: main
  self:
    path: config
